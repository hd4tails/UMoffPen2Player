<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UMoffPen2Player</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1f4;
      --panel: #ffffff;
      --panel-2: #f7f9fa;
      --border: #cfd7df;
      --text: #18212b;
      --muted: #5a6875;
      --accent: #0f766e;
      --accent-dark: #0b5c55;
      --danger: #b42318;
      --ok: #087443;
      --shadow: 0 16px 38px rgba(29, 41, 57, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    main {
      display: grid;
      grid-template-columns: minmax(360px, 520px) minmax(480px, 1fr);
      gap: 18px;
      width: min(1600px, calc(100vw - 32px));
      margin: 16px auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .left {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 32px);
    }

    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child {
      border-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 260px;
      resize: vertical;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fbfcfd;
      color: var(--text);
      font-family: Consolas, "SFMono-Regular", ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.45;
      outline: none;
    }

    textarea:focus,
    input[type="file"]:focus,
    button:focus {
      outline: 2px solid rgba(15, 118, 110, 0.25);
      outline-offset: 2px;
    }

    input[type="file"] {
      width: 100%;
      padding: 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      min-height: 36px;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font-weight: 650;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      min-width: 0;
    }

    .field label {
      margin-bottom: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .field input[type="number"],
    .field select {
      width: 100%;
      min-height: 34px;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
    }

    .inline-status {
      align-self: end;
      min-height: 34px;
      display: flex;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-weight: 600;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
      white-space: pre-wrap;
    }

    progress {
      width: 100%;
      height: 12px;
      accent-color: var(--accent);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      min-width: 0;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .notice {
      color: var(--muted);
      font-size: 12px;
    }

    .preview {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 32px);
    }

    .preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      border-radius: 8px 8px 0 0;
    }

    .canvas-wrap {
      flex: 1;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 14px;
      background:
        linear-gradient(45deg, #d8dee5 25%, transparent 25%),
        linear-gradient(-45deg, #d8dee5 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d8dee5 75%),
        linear-gradient(-45deg, transparent 75%, #d8dee5 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      border-radius: 0 0 8px 8px;
      overflow: auto;
    }

    canvas {
      width: min(100%, 1280px);
      height: auto;
      aspect-ratio: 16 / 9;
      background: #ffffff;
      border: 1px solid #aeb8c2;
      image-rendering: auto;
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }

      .left,
      .preview {
        min-height: auto;
      }

      textarea {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel left">
      <div class="header">
        <h1>UMoffPen2Player</h1>
        <div class="sub">UMoffPen2のセーブデータを再生するツールです。</div>
      </div>

      <div class="section">
        <label for="sourceText">セーブデータ</label>
        <textarea id="sourceText" spellcheck="false" autocomplete="off" placeholder="UMSD[version,expandedBytes,compactBytes,checksum]... を貼り付け"></textarea>
        <label for="fileInput">.txt を読み込み</label>
        <input id="fileInput" type="file" accept=".txt,text/plain">
        <div class="actions">
          <button id="renderButton" class="primary" type="button">再生</button>
          <button id="clearButton" type="button">クリア</button>
        </div>
      </div>

      <div class="section">
        <label>画像</label>
        <div class="actions">
          <button id="downloadButton" type="button" disabled>PNGで保存</button>
          <button id="downloadLayersButton" type="button" disabled>レイヤーごとに保存</button>
        </div>
      </div>

      <div class="section">
        <label>タイムラプス</label>
        <div class="control-grid">
          <div class="field">
            <label for="timelapseSecondsInput">動画の秒数</label>
            <input id="timelapseSecondsInput" type="number" min="1" max="600" step="1" value="10">
          </div>
          <div class="field">
            <label for="timelapseResolutionSelect">動画の解像度</label>
            <select id="timelapseResolutionSelect">
              <option value="1" selected>1/1 - 1920x1080</option>
              <option value="0.5">1/2 - 960x540</option>
              <option value="0.25">1/4 - 480x270</option>
            </select>
          </div>
          <div id="videoStatus" class="inline-status">動画未作成</div>
          <div class="field">
            <label>&nbsp;</label>
            <button id="createVideoButton" type="button">MP4を作成</button>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button id="downloadVideoButton" type="button" disabled>MP4を保存</button>
          </div>
        </div>
      </div>

      <div class="section">
        <label>ステータス</label>
        <div id="status" class="status">UMSD入力待ち</div>
        <progress id="progress" max="1" value="0"></progress>
        <div class="stats">
          <div class="stat"><span>データサイズ</span><strong id="dataSizeStat">-</strong></div>
          <div class="stat"><span>レイヤー数</span><strong id="layerCountStat">-</strong></div>
          <div class="stat"><span>コマンド数</span><strong id="commandsStat">-</strong></div>
          <div class="stat"><span>再生時間</span><strong id="timeStat">-</strong></div>
          <div class="stat"><span>ストローク数</span><strong id="strokeStat">-</strong></div>
        </div>
      </div>

      <div class="section notice">
        © 2026 はい / hy. 公式公開ページでの利用のみ許可。再配布・再ホスト・改変公開は禁止。
      </div>
    </section>

    <section class="panel preview">
      <div class="preview-bar">
        <strong>プレビュー</strong>
      </div>
      <div class="canvas-wrap">
        <canvas id="previewCanvas" width="1920" height="1080"></canvas>
      </div>
    </section>
  </main>
